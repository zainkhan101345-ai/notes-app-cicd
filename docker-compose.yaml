version: "3.9"

services:

  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: notes-server
    environment:
      MONGO_URI: mongodb://mongodb:27017/notesdb
    depends_on:
      - mongodb

  client:
    build: ./notes-app
    container_name: notes-client
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo_data: